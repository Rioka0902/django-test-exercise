<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>タスクの編集</title>
</head>
<body>
    <h1>タスクの編集</h1>
    
    <form action="{% url 'edit' task.pk %}" method="POST">
        {% csrf_token %}
        <div>
            <label for="title">タスク名:</label>
            <input type="text" name="title" id="title" value="{{ task.title }}" required>
        </div>
        <div>
            <label for="due_at">締め切り:</label>
            <input type="datetime-local" name="due_at" id="due_at" value="{{ task.due_at|date:'Y-m-d\TH:i' }}">
        </div>
        <button type="submit">更新する</button>
    </form>

    <a href="{% url 'index' %}">戻る</a>
</body>
</html>
